<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

		<link rel="manifest" href="%sveltekit.assets%/manifest.webmanifest" />

		<!-- iOS: apple-touch-icon tiene precedencia sobre los iconos del manifest; 180×180 opaco -->
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />

		<!-- Standalone: ambas metas — la estándar calla el warning de Chromium; la de Apple
		     sigue vigente en Safari y es requisito para que funcionen las splash screens -->
		<meta name="mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-capable" content="yes" />

		<!-- black-translucent: la app se dibuja bajo la barra de estado de iOS; requiere
		     viewport-fit=cover (arriba) y env(safe-area-inset-*) en el CSS del layout -->
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<meta name="apple-mobile-web-app-title" content="heich-gi" />

		<!-- En iOS manda esta meta (Safari 15+), no el theme_color del manifest -->
		<meta name="theme-color" content="#0b1220" />

		<!-- Splash screens iOS (pendiente, fase 1.5): iOS no las genera del manifest; generar
		     los <link rel="apple-touch-startup-image"> con `npx pwa-asset-generator` y pegarlos aquí -->

		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
