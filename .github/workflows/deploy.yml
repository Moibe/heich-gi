name: deploy heich-gi 📍🛰️

on:
    push:
        branches:
            - main
    workflow_dispatch: # permite correrlo a mano desde la pestaña Actions

jobs:
    deploy:
        name: pull · build · restart
        runs-on: ubuntu-latest

        steps:
            - name: install ssh key
              run: |
                  install -m 600 -D /dev/null ~/.ssh/id_rsa
                  echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.SSH_HOST }} > ~/.ssh/known_hosts

            # Node/npm/pm2 viven en nvm; en una shell SSH no-interactiva NO están en
            # el PATH (el .bashrc que carga nvm se salta en shells no-interactivas),
            # así que cargamos nvm explícitamente antes de usarlos. Todo en una línea
            # para evitar líos de comillas/continuaciones. La cadena con && aborta si
            # algo falla, así pm2 NO reinicia con un build roto (sin downtime).
            #
            # Credenciales OwnTracks: si los secrets OWNTRACKS_USER/OWNTRACKS_PASS
            # existen, se re-escriben en el .env del droplet en cada deploy (cambiar
            # el secret en GitHub + re-deploy = rotar la contraseña, sin SSH manual).
            # OJO: contraseña solo con letras/números/guiones (va embebida en la
            # línea ssh). Las migraciones corren tras el build, antes del restart.
            - name: deploy on droplet
              run: |
                  ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} 'if [ ! -d ~/code/heich-gi ]; then echo "droplet sin bootstrap todavía — corre el workflow bootstrap primero"; exit 0; fi; export NVM_DIR="$HOME/.nvm" && . "$NVM_DIR/nvm.sh" && nvm use node >/dev/null && cd ~/code/heich-gi && git checkout main && git pull origin main && { [ -f .env ] || printf "ORIGIN=https://coleccionador.live\nPORT=3300\nHOST=127.0.0.1\n" > .env; } && { [ -z "${{ secrets.OWNTRACKS_USER }}" ] || { sed -i "/^OWNTRACKS_USER=/d;/^OWNTRACKS_PASS=/d" .env; printf "OWNTRACKS_USER=%s\nOWNTRACKS_PASS=%s\n" "${{ secrets.OWNTRACKS_USER }}" "${{ secrets.OWNTRACKS_PASS }}" >> .env; }; } && npm ci && npm run build && npm run db:migrate && set -a && . ./.env && set +a && (pm2 restart heich-gi --update-env 2>/dev/null || pm2 start build/index.js --name heich-gi --update-env) && pm2 save'

            - name: cleanup
              run: rm -rf ~/.ssh
